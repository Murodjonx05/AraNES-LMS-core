services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.core
    ports:
      - "8000:8000"
    environment:
      JWT_SECRET_KEY: change-me-before-production
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
