name: CI

on:
  push:
    branches:
      - main
      - architecture-changes-1
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET_KEY: test-secret-key-with-32-byte-minimum!!
      CORS_ALLOW_ORIGINS: http://localhost:3000
      REDIS_ENABLED: "false"
      RATE_LIMIT_ENABLED: "false"
      APP_PROFILING_ENABLED: "false"
      APP_FUNCTION_PROFILING_ENABLED: "false"
      BOOTSTRAP_SUPERUSER_PROMPT: "false"
      BOOTSTRAP_SUPERUSER_CREATE: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements/dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Ruff
        run: ruff check .

      - name: Pytest
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.core
          push: false